<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>vipul yadav</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ── Portrait ───────────────────────────────────────────────
         Drop your watercolor image into this folder and update the
         filename below (it currently expects ./vipul.jpg). */
      --portrait: url("./vipul.jpg");

      /* ── Surfaces / type ──────────────────────────────────────── */
      --page-bg: #ffffff;        /* desktop page behind the card   */
      --surface: #ffffff;        /* card body / gradient fade-to    */
      --title: #111827;
      --body: #4b5563;
      --btn-bg: #ffffff;
      --btn-border: #e5e7eb;
      --btn-text: #111827;

      /* ── Shadows ──────────────────────────────────────────────── */
      --card-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06),
                     0 3px 6px -1px rgba(0, 0, 0, 0.06),
                     0 4px 12px 0 rgba(0, 0, 0, 0.04);
      --btn-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06),
                    0 1px 2px -1px rgba(0, 0, 0, 0.06),
                    0 2px 4px 0 rgba(0, 0, 0, 0.04);

      /* ── Card sizing (desktop) ────────────────────────────────── */
      --card-width: 380px;
      --card-radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;               /* no scroll, any platform */
    }

    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── The card ─────────────────────────────────────────────────
       The portrait is the card's own background; a gradient fades the
       lower portion into the surface where the text + buttons live. */
    /* Interactive dot field behind everything (desktop page background) */
    #dots {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: var(--card-width);
      height: min(640px, calc(100dvh - 48px));
      border-radius: var(--card-radius);
      overflow: hidden;
      background-color: var(--surface);
      background-image: var(--portrait);
      background-size: cover;
      background-position: center -70px;   /* nudged up so the figure clears the text */
      background-repeat: no-repeat;
      box-shadow: var(--card-shadow);
    }

    /* Gradient fade at the bottom of the image into the surface */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        198deg,
        transparent 0%,
        transparent 42%,
        rgba(255, 255, 255, 0.6) 56%,
        var(--surface) 70%,
        var(--surface) 100%
      );
      pointer-events: none;
    }

    /* Content block — pushed to the bottom, sits above the gradient */
    .content {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: 24px 24px 24px;     /* 24px sides + bottom */
    }

    .name {
      color: #212121;
      font-size: 1.625rem;
      font-weight: 600;
      line-height: normal;
      letter-spacing: -0.0325rem;
      margin-bottom: 16px;         /* name → bio */
    }

    .bio {
      color: #212121;
      opacity: 0.67;
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.375rem;
      margin-bottom: 32px;         /* bio → buttons */
    }

    .actions {
      display: flex;
      gap: 16px;                   /* between Email & LinkedIn */
    }

    .btn {
      flex: 1 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.25rem;
      background: #fff;
      box-shadow: var(--btn-shadow);
      color: #212121;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: normal;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.08), 0 4px 8px 0 rgba(0, 0, 0, 0.05);
      outline: none;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Mobile: the card becomes the page ────────────────────────
       No card chrome — the portrait fills the screen and the content
       is anchored to the bottom of the viewport. */
    @media (max-width: 400px) {
      .card {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
      .content {
        padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

  <script>
    (() => {
      "use strict";
      const canvas = document.getElementById("dots");
      const ctx = canvas.getContext("2d");

      const PITCH = 14;       // 2px dot + 12px gap
      const DOT = 2;          // dot size
      const R = 128;          // cursor influence radius
      const MAX_PUSH = 8;     // how far dots spread away from the cursor (fisheye)

      // Darkness is a continuous field; quantize into a handful of greys
      // so we can batch the draw, but the field itself flows over time.
      const LEVELS = 9;
      const LIGHT = 220, DARK = 150;
      const grey = [];
      for (let i = 0; i < LEVELS; i++) {
        const v = Math.round(LIGHT - (i / (LEVELS - 1)) * (LIGHT - DARK));
        grey.push("rgb(" + v + "," + v + "," + v + ")");
      }

      // Animated value field — domain-warped sum of sines, the classic
      // "shader" look: darkness drifts and swirls across the grid.
      function field(x, y, t) {
        const wx = x + Math.sin(y * 0.020 + t * 0.6) * 9;
        const wy = y + Math.cos(x * 0.020 - t * 0.5) * 9;
        let n = Math.sin(wx * 0.040 + t * 0.8)
              + Math.cos(wy * 0.045 - t * 0.6)
              + Math.sin((wx + wy) * 0.028 + t) * 0.7;
        return n / 2.7 * 0.5 + 0.5;          // ~0..1
      }

      let dpr = 1, W = 0, H = 0, cols = 0, rows = 0;
      let shadeBuf = new Uint8Array(0);      // per-dot quantized darkness, refreshed each frame

      function resize() {
        dpr = Math.min(2, window.devicePixelRatio || 1);
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.ceil(W / PITCH) + 1;
        rows = Math.ceil(H / PITCH) + 1;
        shadeBuf = new Uint8Array(cols * rows);
      }

      const mouse = { x: -1e4, y: -1e4, tx: -1e4, ty: -1e4, active: false, power: 0 };
      window.addEventListener("pointermove", (e) => {
        mouse.tx = e.clientX; mouse.ty = e.clientY;
        if (!mouse.active) { mouse.x = mouse.tx; mouse.y = mouse.ty; }
        mouse.active = true;
      });
      window.addEventListener("pointerdown", (e) => {
        mouse.tx = e.clientX; mouse.ty = e.clientY; mouse.active = true;
      });
      const sleep = () => { mouse.active = false; };
      window.addEventListener("pointerleave", sleep);
      window.addEventListener("blur", sleep);

      const half = DOT / 2;
      const R2 = R * R;

      function draw(t) {
        ctx.clearRect(0, 0, W, H);
        const mx = mouse.x, my = mouse.y, power = mouse.power;
        const useCursor = power > 0.003;

        // 1) sample the flowing darkness field for every dot
        for (let j = 0; j < rows; j++) {
          const y = j * PITCH, rowOff = j * cols;
          for (let i = 0; i < cols; i++) {
            const u = field(i * PITCH, y, t);          // 0..1
            const d = u * u;                           // bias toward light; patches go dark
            let lvl = (d * LEVELS) | 0;
            if (lvl >= LEVELS) lvl = LEVELS - 1;
            else if (lvl < 0) lvl = 0;
            shadeBuf[rowOff + i] = lvl;
          }
        }

        // 2) one batched fill pass per grey level
        for (let lvl = 0; lvl < LEVELS; lvl++) {
          ctx.fillStyle = grey[lvl];
          ctx.beginPath();
          let drew = false;
          for (let j = 0; j < rows; j++) {
            const rowOff = j * cols, baseY = j * PITCH;
            for (let i = 0; i < cols; i++) {
              if (shadeBuf[rowOff + i] !== lvl) continue;
              let x = i * PITCH, y = baseY;
              if (useCursor) {
                const dx = mx - x, dy = my - y;
                const d2 = dx * dx + dy * dy;
                if (d2 < R2 && d2 > 0.01) {
                  const dd = Math.sqrt(d2);
                  const f = 1 - dd / R;                // 1 at cursor, 0 at edge
                  const push = MAX_PUSH * f * f * power;
                  x -= (dx / dd) * push;               // away from cursor (fisheye spread)
                  y -= (dy / dd) * push;
                }
              }
              ctx.rect(x - half, y - half, DOT, DOT);
              drew = true;
            }
          }
          if (drew) ctx.fill();
        }
      }

      let start = 0;
      function frame(ts) {
        if (!start) start = ts;
        const t = (ts - start) * 0.0007;     // gentle drift
        mouse.x += (mouse.tx - mouse.x) * 0.2;
        mouse.y += (mouse.ty - mouse.y) * 0.2;
        mouse.power += ((mouse.active ? 1 : 0) - mouse.power) * 0.12;
        draw(t);
        raf = requestAnimationFrame(frame);
      }

      // Continuous animation, but pause it when there's nothing to show:
      // on mobile the full-bleed card covers the field, and honor
      // prefers-reduced-motion.
      let raf = 0;
      const hideMQ = window.matchMedia("(max-width: 400px)");
      const reduceMQ = window.matchMedia("(prefers-reduced-motion: reduce)");
      function play() {
        if (raf || hideMQ.matches) return;
        if (reduceMQ.matches) { start = 0; draw(0); return; }  // static frame only
        start = 0; raf = requestAnimationFrame(frame);
      }
      function stop() { if (raf) { cancelAnimationFrame(raf); raf = 0; } }

      window.addEventListener("resize", () => { resize(); if (hideMQ.matches) { stop(); ctx.clearRect(0, 0, W, H); } else play(); });
      hideMQ.addEventListener("change", () => { if (hideMQ.matches) { stop(); ctx.clearRect(0, 0, W, H); } else play(); });
      reduceMQ.addEventListener("change", () => { stop(); play(); });
      document.addEventListener("visibilitychange", () => { document.hidden ? stop() : play(); });

      resize();
      play();
    })();
  </script>
